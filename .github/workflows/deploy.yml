name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      env:
        required: false
        default: "prod"
        description: "The environment to deploy to"
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: write

env:
  S3_BUCKET_NAME: ftheroads.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  terraform:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Pre-sync to S3
        continue-on-error: true
        id: pre-sync
        run: aws s3 sync dist/ s3://$S3_BUCKET_NAME --delete

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: iac

      - name: Remove orphaned S3 bucket (no state)
        continue-on-error: true
        run: |
          # If bucket exists but isn't in tfstate, force-remove it so
          # Terraform can create it fresh (s3 bucket names are globally unique)
          if aws s3 ls --query "Buckets[?Name=='$S3_BUCKET_NAME'].Name" --output text 2>/dev/null | grep -q "$S3_BUCKET_NAME"; then
            echo "Found orphaned bucket, emptying and deleting..."
            aws s3 rm "s3://$S3_BUCKET_NAME" --recursive
            aws s3api delete-bucket --bucket "$S3_BUCKET_NAME"
            echo "Bucket deleted. Waiting 10s for AWS to release the name..."
            sleep 10
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars
        working-directory: iac
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}

      - name: Post-sync to S3 (after terraform for initial bucket creation)
        if: steps.pre-sync.outcome == 'failure'
        run: aws s3 sync dist/ s3://$S3_BUCKET_NAME --delete

      - name: Invalidate CloudFront
        if: always()
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@, 'ftheroads.com')]].Id" --output text 2>/dev/null || true)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi

      - name: Commit terraform state
        if: always()
        run: |
          git config user.name "kurt-croix"
          git config user.email "kurt-croix@users.noreply.github.com"
          git add iac/terraform.tfstate
          git diff --cached --quiet || git commit -m "terraform: update state [skip ci]"
          git push
