name: Deploy
# Deploys to S3/CloudFront and GitHub Pages
on:
  push:
    branches: [master, main, feature/**]
    paths:
      - 'iac/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write

env:
  S3_BUCKET_NAME: ftheroads.com
  VITE_LAMBDA_URL: https://ocoxc5q46dsjb7m4qqgy6sxn4y0srnal.lambda-url.us-east-1.on.aws/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  terraform-plan:
    runs-on: ubuntu-latest
    needs: build
    # Plan runs on ALL branches
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: iac

      - name: Untaint tainted resources
        run: terraform untaint aws_s3_bucket.website 2>&1 || true
        working-directory: iac

      - name: Terraform Plan
        run: terraform plan -var-file=envs/prod.tfvars
        working-directory: iac
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [build, terraform-plan]
    # Apply ONLY on master/main
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: iac

      - name: Untaint tainted resources
        run: terraform untaint aws_s3_bucket.website 2>&1 || true
        working-directory: iac

      - name: Import existing Lambda permissions
        run: |
          terraform import -var-file=envs/prod.tfvars aws_lambda_permission.function_url_invoke ftheroads-send-email/FunctionURLAllowPublicAccess 2>&1 || true
        working-directory: iac
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars
        working-directory: iac
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}

      - name: Verify Lambda Function URL
        run: |
          URL=$(terraform output -raw lambda_function_url)
          echo "Lambda URL: $URL"

          # Test direct Lambda invoke (bypasses Function URL)
          echo '{"httpMethod":"POST","headers":{"origin":"https://ftheroads.com"},"body":"{\"to\":\"test@example.com\",\"subject\":\"CI test\",\"text\":\"test\"}"}' \
            | aws lambda invoke --function-name ftheroads-send-email --payload file:///dev/stdin /tmp/lambda-response.json --cli-binary-format raw-in-base64-out
          echo "Direct invoke response:"
          cat /tmp/lambda-response.json

          # Test Function URL
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Origin: https://ftheroads.com" \
            -d '{"to":"test@example.com","subject":"CI test","text":"test"}')
          echo "Function URL status: $STATUS"
        working-directory: iac

      - name: Sync to S3
        run: aws s3 sync dist/ s3://$S3_BUCKET_NAME --delete

      - name: Invalidate CloudFront
        if: always()
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@, 'ftheroads.com')]].Id" --output text 2>/dev/null || true)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi

      - name: Commit terraform state
        if: always()
        run: |
          git config user.name "kurt-croix"
          git config user.email "kurt-croix@users.noreply.github.com"
          git add iac/terraform.tfstate
          git diff --cached --quiet || git commit -m "terraform: update state [skip ci]"
          git push

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    # Pages deploys only on main/master
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build for GitHub Pages
        run: npm install && npm run build
        env:
          VITE_BASE_PATH: "/FtheRoads/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
