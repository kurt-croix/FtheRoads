name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      env:
        required: false
        default: "prod"
        description: "The environment to deploy to"
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: write

env:
  S3_BUCKET_NAME: ftheroads.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  terraform:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Pre-sync to S3
        continue-on-error: true
        id: pre-sync
        run: aws s3 sync dist/ s3://$S3_BUCKET_NAME --delete

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: iac

      - name: Import existing resources
        continue-on-error: true
        working-directory: iac
        timeout-minutes: 3
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones --query "HostedZones[?Name=='ftheroads.com.'].Id" --output text 2>/dev/null | sed 's|/hostedzone/||')
          TF_IMPORT="terraform import -var-file=envs/prod.tfvars"

          imports=(
            "aws_s3_bucket_public_access_block.website|$S3_BUCKET_NAME"
            "aws_s3_bucket_ownership_controls.website|$S3_BUCKET_NAME"
            "aws_s3_bucket_acl.website|$S3_BUCKET_NAME"
            "aws_s3_bucket_website_configuration.website|$S3_BUCKET_NAME"
            "aws_s3_bucket_policy.website|$S3_BUCKET_NAME"
            "aws_iam_role.email_lambda|ftheroads-email-lambda"
          )

          for item in "${imports[@]}"; do
            addr="${item%%|*}"
            id="${item##*|}"
            echo "Importing $addr ($id)..."
            timeout 10 $TF_IMPORT "$addr" "$id" 2>&1 && echo "OK" || echo "Skipped"
          done

          if [ -n "$ZONE_ID" ]; then
            timeout 10 $TF_IMPORT "aws_route53_record.spf" "${ZONE_ID}_ftheroads.com_TXT" 2>&1 && echo "OK" || echo "Skipped"
            timeout 10 $TF_IMPORT "aws_route53_record.dkim" "${ZONE_ID}_resend._domainkey.ftheroads.com_TXT" 2>&1 && echo "OK" || echo "Skipped"
            timeout 10 $TF_IMPORT "aws_route53_record.dmarc" "${ZONE_ID}__dmarc.ftheroads.com_TXT" 2>&1 && echo "OK" || echo "Skipped"
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars
        working-directory: iac
        env:
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}

      - name: Post-sync to S3 (after terraform for initial bucket creation)
        if: steps.pre-sync.outcome == 'failure'
        run: aws s3 sync dist/ s3://$S3_BUCKET_NAME --delete

      - name: Invalidate CloudFront
        if: always()
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@, 'ftheroads.com')]].Id" --output text 2>/dev/null || true)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi

      - name: Commit terraform state
        if: always()
        run: |
          git config user.name "kurt-croix"
          git config user.email "kurt-croix@users.noreply.github.com"
          git add iac/terraform.tfstate
          git diff --cached --quiet || git commit -m "terraform: update state [skip ci]"
          git push
